<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>도구 | Welmoa Tools</title>
  <link rel="stylesheet" href="/assets/site.css">
  <script defer src="/assets/site.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container site-header__inner">
      <a class="site-brand" href="/">
        <span class="site-brand__logo">W</span>
        <span class="site-brand__text">
          <span class="site-brand__title">Welmoa Tools</span>
          <span class="site-brand__sub">복지업무 도구 포털</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="주요 메뉴">
        <a href="/" data-nav>홈</a>
        <a href="/tools" data-nav>도구</a>
        <a href="/updates" data-nav>업데이트</a>
        <a href="/about" data-nav>소개</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-title">
      <div class="container">
        <h1>도구</h1>
        <p>현재 사용할 수 있는 Welmoa Tools 기능 목록입니다.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="card-grid">
          <article class="card card--tool">
            <div class="card__icon">₩</div>
            <h2 class="card__title">급여조회</h2>
            <p class="card__text">급여, 수당, 공제 조건을 반영한 조회 도구</p>
            <div class="card__meta">
              <span class="badge badge--green">운영중</span>
              <span class="badge badge--blue">계산</span>
            </div>
            <div><a class="btn btn--primary" href="/salary">도구 열기</a></div>
          </article>

          <article class="card card--tool">
            <div class="card__icon">🎲</div>
            <h2 class="card__title">신청자 추첨</h2>
            <p class="card__text">신청자 정보를 기반으로 무작위 추첨을 진행하는 도구</p>
            <div class="card__meta">
              <span class="badge badge--green">운영중</span>
              <span class="badge badge--blue">추첨</span>
            </div>
            <div><a class="btn btn--primary" href="/lottery">도구 열기</a></div>
          </article>

          <article class="card card--tool">
            <div class="card__icon">＋</div>
            <h2 class="card__title">추가 도구</h2>
            <p class="card__text">향후 추가될 실무 지원 기능을 위한 자리입니다.</p>
            <div class="card__meta">
              <span class="badge badge--orange">준비중</span>
            </div>
            <div><a class="btn btn--ghost" href="/updates">업데이트 보기</a></div>
          </article>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <div>© Welmoa Tools</div>
      <nav class="site-footer__nav">
        <a href="/">홈</a>
        <a href="/updates">업데이트</a>
        <a href="/about">소개</a>
      </nav>
    </div>
  </footer>
</body>
</html>
