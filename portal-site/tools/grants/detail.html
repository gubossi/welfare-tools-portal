<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공모사업 상세 | Welmoa</title>
  <link rel="stylesheet" href="/assets/site.css" />
  <style>
    .detail-wrap { max-width: 920px; margin: 0 auto; padding: 48px 20px; }
    .back-link { display:inline-block; margin-bottom:20px; color:#2563eb; font-weight:700; text-decoration:none; }
    .detail-card { background:#fff; border:1px solid #e2e8f0; border-radius:24px; padding:30px; box-shadow:0 10px 28px rgba(15,23,42,.06); }
    .detail-title { font-size:30px; line-height:1.35; margin:0 0 18px; letter-spacing:-0.04em; }
    .badge { display:inline-flex; padding:7px 12px; border-radius:999px; background:#eff6ff; color:#1d4ed8; font-weight:800; font-size:13px; margin-bottom:16px; }
    .info-grid { display:grid; grid-template-columns:160px 1fr; gap:12px 16px; margin:24px 0; padding:20px; background:#f8fafc; border-radius:18px; }
    .label { color:#64748b; font-weight:700; }
    .value { color:#0f172a; }
    .summary-box { line-height:1.8; color:#334155; border-top:1px solid #e2e8f0; padding-top:22px; margin-top:20px; }
    .btn-row { margin-top:28px; display:flex; gap:10px; flex-wrap:wrap; }
    .btn { display:inline-flex; padding:12px 16px; border-radius:12px; text-decoration:none; font-weight:800; }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-secondary { background:#f1f5f9; color:#334155; }
    .empty { padding:40px; text-align:center; color:#64748b; background:#f8fafc; border-radius:18px; }
  </style>
</head>
<body>
  <main class="detail-wrap">
    <a class="back-link" href="/tools/grants/">← 목록으로 돌아가기</a>
    <section id="detailArea" class="detail-card">
      <div class="empty">공모사업 정보를 불러오는 중입니다...</div>
    </section>
  </main>

  <script>
    async function loadDetail() {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");

      if (!id) {
        renderEmpty("공모사업 ID가 없습니다.");
        return;
      }

      try {
        const res = await fetch("/api/grants/list");
        const data = await res.json();

        const item = (data.items || []).find(row => String(row.id) === String(id));

        if (!item) {
          renderEmpty("해당 공모사업을 찾을 수 없습니다.");
          return;
        }

        renderDetail(item);
      } catch (error) {
        renderEmpty("상세 정보를 불러오지 못했습니다.");
      }
    }

    function renderDetail(item) {
      document.getElementById("detailArea").innerHTML = `
        <span class="badge">적합도 ${Number(item.fit_score || 0)}점</span>
        <h1 class="detail-title">${escapeHtml(item.title || "제목 없음")}</h1>

        <div class="info-grid">
          <div class="label">기관</div>
          <div class="value">${escapeHtml(item.organization || "-")}</div>

          <div class="label">지역</div>
          <div class="value">${escapeHtml(item.region || "-")}</div>

          <div class="label">분야</div>
          <div class="value">${escapeHtml(item.category || "-")}</div>

          <div class="label">신청기간</div>
          <div class="value">${escapeHtml(item.apply_start || "-")} ~ ${escapeHtml(item.apply_end || "-")}</div>

          <div class="label">등록일</div>
          <div class="value">${escapeHtml(item.posted_date || "-")}</div>

          <div class="label">출처</div>
          <div class="value">${escapeHtml(item.source || "-")}</div>
        </div>

        <div class="summary-box">
          ${escapeHtml(sanitizeSummary(item.summary || "요약 정보가 없습니다."))}
        </div>

        <div class="btn-row">
          <a class="btn btn-primary" href="${escapeAttr(item.url || "#")}" target="_blank" rel="noopener">원문보기</a>
          <a class="btn btn-secondary" href="/tools/grants/">목록으로</a>
        </div>
      `;
    }

    function renderEmpty(message) {
      document.getElementById("detailArea").innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
    }

    function sanitizeSummary(html) {
      return String(html || "")
        .replace(/<[^>]*>/g, " ")
        .replaceAll("&nbsp;", " ")
        .replaceAll("&amp;", "&")
        .replace(/\s+/g, " ")
        .trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    loadDetail();
  </script>
</body>
</html>
