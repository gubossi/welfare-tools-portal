<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공모사업 자동수집 | Welmoa</title>
  <link rel="stylesheet" href="/assets/site.css" />
  <style>
    .grants-wrap { max-width: 1120px; margin: 0 auto; padding: 48px 20px; }
    .page-kicker { color:#2563eb; font-weight:700; margin-bottom:10px; }
    .page-title { font-size:34px; margin:0 0 10px; letter-spacing:-0.04em; }
    .page-desc { color:#64748b; margin-bottom:28px; line-height:1.7; }

    .toolbar {
      display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px;
      background:#f8fafc; border:1px solid #e2e8f0; border-radius:18px; padding:16px;
    }
    .toolbar input, .toolbar select {
      padding:12px 14px; border:1px solid #cbd5e1; border-radius:12px;
      font-size:15px; background:white;
    }
    .toolbar input { flex:1; min-width:220px; }

    .summary {
      display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; margin-bottom:24px;
    }
    .summary-card {
      background:white; border:1px solid #e2e8f0; border-radius:18px; padding:18px;
      box-shadow:0 8px 20px rgba(15,23,42,.04);
    }
    .summary-card strong { display:block; font-size:26px; margin-bottom:4px; }
    .summary-card span { color:#64748b; font-size:14px; }

    .grant-list { display:grid; gap:16px; }
    .grant-card {
      background:white; border:1px solid #e2e8f0; border-radius:20px; padding:22px;
      box-shadow:0 10px 24px rgba(15,23,42,.05);
    }
    .grant-top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .grant-title { font-size:20px; font-weight:800; margin:0 0 10px; letter-spacing:-0.03em; }
    .badge {
      display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px;
      background:#eff6ff; color:#1d4ed8; font-size:13px; font-weight:700; white-space:nowrap;
    }
    .meta { color:#64748b; font-size:14px; line-height:1.8; margin-bottom:12px; }
    .summary-text { color:#334155; line-height:1.7; margin:0 0 16px; }
    .actions { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .score { font-weight:800; color:#0f172a; }
    .btn {
      display:inline-flex; text-decoration:none; background:#2563eb; color:white;
      padding:10px 14px; border-radius:12px; font-weight:700; font-size:14px;
    }
    .empty { padding:30px; text-align:center; color:#64748b; background:#f8fafc; border-radius:18px; }

    @media (max-width: 760px) {
      .summary { grid-template-columns:1fr; }
      .grant-top, .actions { flex-direction:column; align-items:flex-start; }
    }

    .tag-row {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin:8px 0 10px;
}

.tag {
  display:inline-flex;
  align-items:center;
  padding:5px 9px;
  border-radius:999px;
  background:#f1f5f9;
  color:#334155;
  font-size:12px;
  font-weight:700;
}

.tag-filter-row {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:-12px 0 24px;
}

.tag-filter {
  border:1px solid #cbd5e1;
  background:white;
  color:#334155;
  padding:9px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
}

.tag-filter.active {
  background:#2563eb;
  border-color:#2563eb;
  color:white;
}

.deadline-badge {
  display:inline-flex;
  align-items:center;
  padding:5px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  margin-left:6px;
}

.deadline-normal {
  background:#eff6ff;
  color:#1d4ed8;
}

.deadline-soon {
  background:#fff7ed;
  color:#ea580c;
}

.deadline-urgent {
  background:#fef2f2;
  color:#dc2626;
}

.deadline-end {
  background:#f1f5f9;
  color:#64748b;
}

.featured-section {
  margin: 10px 0 28px;
}

.section-head h2 {
  margin: 0 0 6px;
  font-size: 24px;
  letter-spacing: -0.03em;
}

.section-head p {
  margin: 0 0 14px;
  color: #64748b;
}

.featured-list {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}

.featured-card {
  background: #fff;
  border: 1px solid #dbeafe;
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 8px 20px rgba(15,23,42,.05);
}

.featured-card h3 {
  font-size: 15px;
  line-height: 1.45;
  margin: 0 0 10px;
  letter-spacing: -0.03em;
}

.featured-meta {
  font-size: 12px;
  color: #64748b;
  line-height: 1.6;
  margin-bottom: 10px;
}

.featured-link {
  display: inline-flex;
  font-size: 13px;
  font-weight: 800;
  color: #2563eb;
  text-decoration: none;
}

@media (max-width: 980px) {
  .featured-list { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 560px) {
  .featured-list { grid-template-columns: 1fr; }
}

.action-buttons {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn-favorite {
  border:0;
  background:#fef3c7;
  color:#92400e;
  cursor:pointer;
}

.btn-favorite:hover {
  background:#fde68a;
}
  </style>
</head>
<body>

  <main class="grants-wrap">
    <div class="page-kicker">Welmoa 공모사업 수집기 v1</div>
    <h1 class="page-title">공모사업 자동수집 목록</h1>
    <p class="page-desc">
      D1 데이터베이스에 저장된 공모사업을 조회합니다. 현재는 테스트 데이터 기반이며,
      다음 단계에서 기업마당 API 자동수집을 연결합니다.
    </p>

    <section class="summary">
      <div class="summary-card">
        <strong id="totalCount">-</strong>
        <span>전체 공모사업</span>
      </div>
      <div class="summary-card">
        <strong id="highScoreCount">-</strong>
        <span>적합도 70점 이상</span>
      </div>
      <div class="summary-card">
        <strong id="nearDeadlineCount">-</strong>
        <span>마감 14일 이내</span>
      </div>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="제목, 기관, 지역, 요약 검색" />
<select id="scoreFilter">
  <option value="all">전체 적합도</option>
  <option value="favorite">즐겨찾기</option>
  <option value="recommend">주목할 공고</option>
  <option value="70">70점 이상</option>
  <option value="50">50점 이상</option>
</select>
      <select id="sortSelect">
        <option value="deadline">마감일 빠른순</option>
        <option value="score">적합도 높은순</option>
        <option value="recent">수집일 최신순</option>
      </select>
      <select id="sourceFilter">
  <option value="all">전체 출처</option>
  <option value="bizinfo">기업마당</option>
</select>
<select id="deadlineFilter">
  <option value="all">전체 마감일</option>
  <option value="3">D-3 이하</option>
  <option value="7">이번주 마감</option>
  <option value="30">이번달 마감</option>
  <option value="closed">마감 공고</option>
</select>
    </section>

    <section class="tag-filter-row">
  <button type="button" class="tag-filter active" data-tag="all">전체</button>
  <button type="button" class="tag-filter" data-tag="장애인">장애인</button>
  <button type="button" class="tag-filter" data-tag="아동">아동</button>
  <button type="button" class="tag-filter" data-tag="청소년">청소년</button>
  <button type="button" class="tag-filter" data-tag="사회복지">사회복지</button>
  <button type="button" class="tag-filter" data-tag="디지털">디지털</button>
  <button type="button" class="tag-filter" data-tag="문화">문화</button>
  <button type="button" class="tag-filter" data-tag="체육">체육</button>
  <button type="button" class="tag-filter" data-tag="경기">경기</button>
  <button type="button" class="tag-filter" data-tag="수원">수원</button>
</section>

<section class="featured-section">
  <div class="section-head">
    <div>
      <h2>🔥 주목할 공고</h2>
      <p>복지·장애·아동·디지털 분야 관련성이 높은 공고를 우선 보여줍니다.</p>
    </div>
  </div>
  <div id="featuredList" class="featured-list">
    <div class="empty">주목할 공고를 불러오는 중입니다...</div>
  </div>
</section>

    
    <section id="grantList" class="grant-list">
      <div class="empty">공모사업 목록을 불러오는 중입니다...</div>
    </section>
  </main>

  <script>
    let grants = [];
let activeTag = "all";

    async function loadGrants() {
      try {
        const res = await fetch("/api/grants/list");
        const data = await res.json();

        if (!data.success) {
          throw new Error("API 응답 오류");
        }

        grants = data.items || [];
        renderSummary();
        renderFeatured();
        renderList();
      } catch (error) {
        document.getElementById("grantList").innerHTML =
          `<div class="empty">목록을 불러오지 못했습니다. /api/grants/list 연결을 확인해 주세요.</div>`;
      }
    }

    function renderSummary() {
      const today = new Date();
      const nearDeadline = grants.filter(item => {
        if (!item.apply_end) return false;
        const end = new Date(item.apply_end);
        const diff = (end - today) / (1000 * 60 * 60 * 24);
        return diff >= 0 && diff <= 14;
      });

      document.getElementById("totalCount").textContent = grants.length;
      document.getElementById("highScoreCount").textContent =
        grants.filter(item => Number(item.fit_score || 0) >= 70).length;
      document.getElementById("nearDeadlineCount").textContent = nearDeadline.length;
    }

function renderFeatured() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const items = [...grants]
    .filter(item => {
      const score = Number(item.fit_score || 0);
      const end = new Date(item.apply_end);
      if (Number.isNaN(end.getTime())) return score >= 50;
      end.setHours(0, 0, 0, 0);
      return score >= 50 && end >= today;
    })
    .sort((a, b) => {
      const scoreDiff = Number(b.fit_score || 0) - Number(a.fit_score || 0);
      if (scoreDiff !== 0) return scoreDiff;
      return String(a.apply_end || "").localeCompare(String(b.apply_end || ""));
    })
    .slice(0, 5);

  const box = document.getElementById("featuredList");

  if (!items.length) {
    box.innerHTML = `<div class="empty">현재 표시할 주목 공고가 없습니다.</div>`;
    return;
  }

  box.innerHTML = items.map(item => `
    <article class="featured-card">
      <h3>${escapeHtml(item.title || "제목 없음")}</h3>
      <div class="featured-meta">
        ${escapeHtml(item.organization || "-")}<br>
        ${escapeHtml(item.apply_end || "-")} ${renderDeadlineBadge(item.apply_end)}
      </div>
      <a class="featured-link" href="/tools/grants/detail.html?id=${item.id}">상세보기 →</a>
    </article>
  `).join("");
}
    
    function renderList() {
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
      const scoreFilter = document.getElementById("scoreFilter").value;
      const sortValue = document.getElementById("sortSelect").value;
      const sourceFilter = document.getElementById("sourceFilter").value;
      const deadlineFilter = document.getElementById("deadlineFilter").value;

      let items = [...grants];
if (activeTag !== "all") {
  items = items.filter(item => getItemText(item).includes(activeTag));
}
if (sourceFilter !== "all") {
  items = items.filter(item => item.source === sourceFilter);
}
if (deadlineFilter !== "all") {

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  items = items.filter(item => {

    if (!item.apply_end) return false;

    const end = new Date(item.apply_end);

    if (Number.isNaN(end.getTime())) return false;

    end.setHours(0, 0, 0, 0);

    const diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));

    if (deadlineFilter === "closed") {
      return diff < 0;
    }

    return diff >= 0 && diff <= Number(deadlineFilter);
  });
}      
      if (keyword) {
        items = items.filter(item => {
          const text = [
            item.title,
            item.organization,
            item.category,
            item.region,
            item.summary
          ].join(" ").toLowerCase();

          return text.includes(keyword);
        });
      }

if (scoreFilter === "favorite") {
  items = items.filter(item => isFavorite(item.id));
} else if (scoreFilter === "recommend") {
  items = items.filter(item => Number(item.fit_score || 0) >= 70);
} else if (scoreFilter !== "all") {
  items = items.filter(item => Number(item.fit_score || 0) >= Number(scoreFilter));
}

      if (sortValue === "score") {
        items.sort((a, b) => Number(b.fit_score || 0) - Number(a.fit_score || 0));
      } else if (sortValue === "recent") {
        items.sort((a, b) => String(b.collected_at || "").localeCompare(String(a.collected_at || "")));
      } else {
        items.sort((a, b) => String(a.apply_end || "").localeCompare(String(b.apply_end || "")));
      }

      const list = document.getElementById("grantList");

      if (!items.length) {
        list.innerHTML = `<div class="empty">조건에 맞는 공모사업이 없습니다.</div>`;
        return;
      }

      list.innerHTML = items.map(item => `
        <article class="grant-card">
          <div class="grant-top">
            <div>
<h2 class="grant-title">${escapeHtml(item.title || "제목 없음")}</h2>
<div class="tag-row">${renderTags(item)}</div>
<div class="meta">
                기관: ${escapeHtml(item.organization || "-")} ·
                지역: ${escapeHtml(item.region || "-")} ·
                분야: ${escapeHtml(item.category || "-")}<br>
                신청기간: ${escapeHtml(item.apply_start || "-")} ~ ${escapeHtml(item.apply_end || "-")}
${renderDeadlineBadge(item.apply_end)} ·
                출처: ${escapeHtml(item.source || "-")}
              </div>
            </div>
            <span class="badge">적합도 ${Number(item.fit_score || 0)}점</span>
          </div>

<p class="summary-text">${escapeHtml(sanitizeSummary(item.summary || "요약 정보가 없습니다."))}</p>

<div class="actions">
  <span class="score">수집일: ${escapeHtml(item.collected_at || "-")}</span>

  <div class="action-buttons">
    <button class="btn btn-favorite" type="button" onclick="toggleFavorite('${item.id}')">
      ${isFavorite(item.id) ? "★ 즐겨찾기 해제" : "☆ 즐겨찾기"}
    </button>

    <a class="btn" href="/tools/grants/detail.html?id=${item.id}">
      상세보기
    </a>

    <a class="btn" href="${escapeAttr(item.url || "#")}" target="_blank" rel="noopener">
      원문보기
    </a>
  </div>
</div>
        </article>
      `).join("");
    }

function sanitizeSummary(html) {
  return String(html || "")
    .replace(/<[^>]*>/g, " ")
    .replaceAll("&nbsp;", " ")
    .replaceAll("&amp;", "&")
    .replace(/\s+/g, " ")
    .trim();
}

function getDdayLabel(dateText) {
  if (!dateText) return "";

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const end = new Date(dateText);
  if (Number.isNaN(end.getTime())) return "";

  end.setHours(0, 0, 0, 0);

  const diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));

  if (diff < 0) return "· 마감";
  if (diff === 0) return "· D-day";
  return `· D-${diff}`;
}

function renderDeadlineBadge(dateText) {
  if (!dateText) return "";

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const end = new Date(dateText);

  if (Number.isNaN(end.getTime())) return "";

  end.setHours(0, 0, 0, 0);

  const diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));

  if (diff < 0) {
    return `<span class="deadline-badge deadline-end">마감</span>`;
  }

  if (diff <= 3) {
    return `<span class="deadline-badge deadline-urgent">D-${diff}</span>`;
  }

  if (diff <= 7) {
    return `<span class="deadline-badge deadline-soon">D-${diff}</span>`;
  }

  return `<span class="deadline-badge deadline-normal">D-${diff}</span>`;
}
    
function sanitizeSummary(html) {
  return String(html || "")
    .replace(/<[^>]*>/g, " ")
    .replaceAll("&nbsp;", " ")
    .replace(/\s+/g, " ")
    .trim();
}
    
    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

function getFavorites() {
  try {
    return JSON.parse(localStorage.getItem("welmoa_grant_favorites") || "[]");
  } catch {
    return [];
  }
}

function setFavorites(ids) {
  localStorage.setItem("welmoa_grant_favorites", JSON.stringify(ids));
}

function isFavorite(id) {
  return getFavorites().includes(String(id));
}

function toggleFavorite(id) {
  const targetId = String(id);
  let favorites = getFavorites();

  if (favorites.includes(targetId)) {
    favorites = favorites.filter(item => item !== targetId);
  } else {
    favorites.push(targetId);
  }

  setFavorites(favorites);
  renderList();
}

function getItemText(item) {
  return [
    item.title,
    item.organization,
    item.category,
    item.region,
    item.summary
  ].join(" ");
}
    
function renderTags(item) {
const text = getItemText(item);

  const tagRules = [
    ["장애인", "장애인"],
    ["발달장애", "발달장애"],
    ["아동", "아동"],
    ["청소년", "청소년"],
    ["사회복지", "사회복지"],
    ["복지관", "복지관"],
    ["비영리", "비영리"],
    ["디지털", "디지털"],
    ["AI", "AI"],
    ["인공지능", "AI"],
    ["VR", "VR"],
    ["메타버스", "메타버스"],
    ["문화", "문화"],
    ["체육", "체육"],
    ["경기", "경기"],
    ["수원", "수원"]
  ];

  const tags = [];

  for (const [keyword, label] of tagRules) {
    if (text.includes(keyword) && !tags.includes(label)) {
      tags.push(label);
    }
  }

  if (!tags.length) {
    return `<span class="tag">일반공고</span>`;
  }

  return tags
    .slice(0, 6)
    .map(tag => `<span class="tag">${escapeHtml(tag)}</span>`)
    .join("");
}
    
    function escapeAttr(value) {
      return escapeHtml(value);
    }

document.getElementById("searchInput").addEventListener("input", renderList);
document.getElementById("scoreFilter").addEventListener("change", renderList);
document.getElementById("sourceFilter").addEventListener("change", renderList);
document.getElementById("deadlineFilter").addEventListener("change", renderList);
document.getElementById("sortSelect").addEventListener("change", renderList);

    document.querySelectorAll(".tag-filter").forEach(button => {
  button.addEventListener("click", () => {
    activeTag = button.dataset.tag;

    document.querySelectorAll(".tag-filter").forEach(btn => {
      btn.classList.remove("active");
    });

    button.classList.add("active");
    renderList();
  });
});
    
    loadGrants();
  </script>
</body>
</html>
