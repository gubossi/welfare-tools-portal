name: Collect Grants

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Bizinfo SQL
        run: node scripts/collect-bizinfo.js > grants.sql
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}

      - name: Generate Chest SQL
        run: node scripts/collect-chest.js >> grants.sql
        continue-on-error: true

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Insert into D1
        run: wrangler d1 execute welmoa-grants --remote --file=grants.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
